<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<style>
:root {
  --bg:       #0a0a0f;
  --surface:  #12121a;
  --surface2: #1a1a26;
  --border:   #1e1e2e;
  --accent:   #00d4ff;
  --green:    #00ff88;
  --red:      #ff4444;
  --dim:      #555577;
  --text:     #ccd6f6;
  --text-dim: #778aaa;
  --mono:     'JetBrains Mono', 'Fira Code', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 16px;
  height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
  text-shadow: 0 0 8px var(--accent);
}
#back-btn {
  margin-left: auto;
  padding: 4px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  text-decoration: none;
  transition: color 0.15s, border-color 0.15s;
}
#back-btn:hover { color: var(--accent); border-color: var(--accent); }

#tts-toggle {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--accent);
  border-color: var(--accent);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
}
#tts-toggle.off { color: var(--dim); border-color: var(--border); }

#status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--dim);
  transition: background 0.3s;
}
#status-dot.online { background: var(--green); box-shadow: 0 0 4px var(--green); }

/* ── Messages ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.msg { display: flex; flex-direction: column; max-width: 72%; }
.msg.user   { align-self: flex-end;   align-items: flex-end; }
.msg.jarvis { align-self: flex-start; align-items: flex-start; }

.msg-who {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  color: var(--dim); margin-bottom: 4px;
}
.msg.jarvis .msg-who { color: var(--accent); }

.msg-bubble {
  padding: 10px 14px;
  border-radius: 8px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user .msg-bubble {
  background: var(--surface2);
  border: 1px solid var(--border);
}
.msg.jarvis .msg-bubble {
  background: rgba(0,212,255,0.06);
  border: 1px solid rgba(0,212,255,0.18);
}

/* ── Status bar ── */
#status-bar {
  font-size: 11px;
  color: var(--dim);
  padding: 4px 24px;
  min-height: 20px;
  flex-shrink: 0;
}

/* ── Input row ── */
#input-row {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
#input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 9px 12px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  resize: none;
  height: 40px;
  max-height: 120px;
  transition: border-color 0.15s;
}
#input:focus { border-color: var(--accent); }
#send-btn {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 8px 18px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
}
#send-btn:hover    { opacity: 0.85; }
#send-btn:disabled { opacity: 0.4; cursor: default; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <span class="brand">⬡ JARVIS</span>
  <div id="status-dot"></div>
  <button id="tts-toggle">🔊 TTS</button>
  <a id="back-btn" href="/dashboard">← Dashboard</a>
</div>

<div id="messages"></div>
<div id="status-bar"></div>

<div id="input-row">
  <textarea id="input" placeholder="Message JARVIS…" rows="1"></textarea>
  <button id="send-btn">SEND</button>
</div>

<script>
const JARVIS_URL = `${location.protocol}//${location.hostname}:5003`

let session = null
let ttsOn   = true
let busy    = false

const messagesEl = document.getElementById('messages')
const inputEl    = document.getElementById('input')
const sendBtn    = document.getElementById('send-btn')
const statusEl   = document.getElementById('status-bar')
const ttsBtn     = document.getElementById('tts-toggle')
const dot        = document.getElementById('status-dot')

/* ── TTS ── */
async function playTTS(text) {
  const m = text.match(/^[^.!?\n]{1,220}[.!?]?/)
  const phrase = m ? m[0].trim() : text.slice(0, 200)
  if (!phrase) return
  try {
    const r = await fetch(JARVIS_URL + '/api/tts?text=' + encodeURIComponent(phrase), {
      signal: AbortSignal.timeout(8000)
    })
    if (!r.ok) return
    const wav = await r.arrayBuffer()
    const ctx = new AudioContext()
    const buf = await ctx.decodeAudioData(wav)
    const src = ctx.createBufferSource()
    src.buffer = buf; src.connect(ctx.destination); src.start(0)
  } catch(e) { console.warn('[TTS]', e.message) }
}

ttsBtn.addEventListener('click', () => {
  ttsOn = !ttsOn
  ttsBtn.textContent = ttsOn ? '🔊 TTS' : '🔇 TTS'
  ttsBtn.classList.toggle('off', !ttsOn)
})

/* ── Messages ── */
function addMessage(role, text) {
  const wrap = document.createElement('div')
  wrap.className = 'msg ' + role
  wrap.innerHTML = `<div class="msg-who">${role === 'user' ? 'YOU' : 'JARVIS'}</div><div class="msg-bubble"></div>`
  wrap.querySelector('.msg-bubble').textContent = text
  messagesEl.appendChild(wrap)
  messagesEl.scrollTop = messagesEl.scrollHeight
  return wrap.querySelector('.msg-bubble')
}

/* ── Session ── */
async function ensureSession() {
  if (session) return true
  try {
    const r = await fetch(JARVIS_URL + '/api/session', { method: 'POST', signal: AbortSignal.timeout(8000) })
    if (!r.ok) return false
    session = (await r.json()).session_token
    dot.className = 'online'
    return true
  } catch { dot.className = ''; return false }
}

/* ── Send ── */
async function sendMessage() {
  const text = inputEl.value.trim()
  if (!text || busy) return
  busy = true
  sendBtn.disabled = true
  inputEl.value = ''
  inputEl.style.height = '40px'

  addMessage('user', text)

  if (!await ensureSession()) {
    statusEl.textContent = '✗ Could not connect to JARVIS'
    busy = false; sendBtn.disabled = false; return
  }

  const bubble = addMessage('jarvis', '')
  statusEl.textContent = 'Thinking…'

  try {
    const r = await fetch(JARVIS_URL + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_token: session }),
      signal: AbortSignal.timeout(300000),
    })
    if (!r.ok) throw new Error('HTTP ' + r.status)

    const reader = r.body.getReader()
    const dec = new TextDecoder()
    let buf = '', full = ''
    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buf += dec.decode(value, { stream: true })
      const lines = buf.split('\n'); buf = lines.pop()
      for (const line of lines) {
        if (!line.trim()) continue
        try {
          const c = JSON.parse(line)
          if (c.content) { full += c.content; bubble.textContent = full; messagesEl.scrollTop = messagesEl.scrollHeight }
        } catch {}
      }
    }
    statusEl.textContent = ''
    if (ttsOn && full) playTTS(full)

  } catch(e) {
    statusEl.textContent = '✗ ' + (e.name === 'TimeoutError' ? 'timed out' : e.message)
    if (e.message?.includes('401')) session = null
  }

  busy = false; sendBtn.disabled = false
  inputEl.focus()
}

sendBtn.addEventListener('click', sendMessage)
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
})
inputEl.addEventListener('input', () => {
  inputEl.style.height = '40px'
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px'
})

/* ── Init ── */
ensureSession()
inputEl.focus()
</script>
</body>
</html>
